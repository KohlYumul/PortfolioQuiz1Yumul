{% extends 'portfolio/base.html' %}
{% block content %}
<div class="card">
    <h1>{{ project.project_name }}</h1>

    <div style="margin-top: 1.5rem;">
        <h3 style="color: var(--primary);">Description</h3>
        <p>{{ project.description }}</p>
    </div>

    <div style="margin-top: 1.5rem;">
        <h3 style="color: var(--primary);">Tech Stack</h3>
        <p><code>{{ project.tech_stack }}</code></p>
    </div>

    {% if project.link %}
    <div style="margin-top: 2rem;">
        <a href="{{ project.link }}" target="_blank" class="btn">View Project Repository</a>
    </div>
    {% endif %}

    <div style="margin-top: 2rem;">
        <a href="{% url 'projects' %}" style="text-decoration: none; color: var(--text-muted);">← Back to Projects List</a>
    </div>
</div>
{% endblock %}
